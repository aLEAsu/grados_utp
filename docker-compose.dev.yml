version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: itp-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: plataforma_grados
      POSTGRES_USER: itp_admin
      POSTGRES_PASSWORD: itp_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itp_admin -d plataforma_grados"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: itp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@itp.edu.co
      PGADMIN_DEFAULT_PASSWORD: admin_dev
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  mailhog:
    image: mailhog/mailhog:latest
    container_name: itp-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres_data_dev:
  pgadmin_data:
